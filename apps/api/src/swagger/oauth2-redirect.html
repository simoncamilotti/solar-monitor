<!doctype html>
<html lang="en-US">
  <body>
    <script>
      'use strict';
      function run() {
        var oauth2 = (window.opener || window.parent).swaggerUIRedirectOauth2;
        var sentState = oauth2.state;
        var redirectUrl = oauth2.redirectUrl;
        var isValid, qp, arr;

        if (/code|token|error/.test(window.location.href)) {
          qp = (window.location.search || '').substring(1) || (window.location.hash || '').substring(1);
        }

        if (qp) {
          arr = qp.split('&');
          arr.forEach(function (v) {
            var kv = v.split('=');
            if (kv[0] === 'code' || kv[0] === 'token') {
              isValid = true;
            }
          });
        }

        if (isValid || qp) {
          oauth2.callback({ url: redirectUrl, window: window, state: sentState, redirectUrl: redirectUrl }, qp);
        } else {
          oauth2.errCb({
            authId: oauth2.state,
            source: 'auth',
            level: 'warning',
            message:
              "Authorization may be unsafe, passed state was changed in server. The passed state wasn't returned from auth server.",
          });
        }

        window.close();
      }
      run();
    </script>
  </body>
</html>
